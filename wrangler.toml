name = "autonomous-ai-agent"
main = "src/index.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

# ─── Public vars (not sensitive) ──────────────────────────────────────────────
[vars]
WORKER_URL             = "https://autonomous-ai-agent.adesrnd.workers.dev"
UPSTASH_WORKFLOW_URL   = "https://autonomous-ai-agent.adesrnd.workers.dev"
BRIDGE_URL             = "https://vega-ebon.vercel.app"
QSTASH_URL             = "https://qstash-us-east-1.upstash.io"
CAPSOLVER_API_KEY      = "CAP-2A932F8E72FBCD417549F606D7407DAE549D9DC65DC85046D1DF6120739FBA70"
TWOCAPTCHA_API_KEY     = "581dddb6024053b4991636afb6596b0a"
CF_ACCOUNT_ID          = "59810af6d60bfb764d81542ccf3ae5bd"

# ─── D1 ───────────────────────────────────────────────────────────────────────
# Contains: telegram_configs, whatsapp_configs, user_secrets, pending_approvals,
#           audit_log, cf_email_senders
# Migrations: npx wrangler d1 execute vega-d1 --remote --file=./migrations/<file>.sql
[[d1_databases]]
binding       = "DB"
database_name = "vega-d1"
database_id   = "b72e0170-75aa-42c1-8194-7f4588d3dee1"

# ─── R2 File Storage ──────────────────────────────────────────────────────────
# Used by: agent file output, cf_screenshot tool
[[r2_buckets]]
binding     = "FILES_BUCKET"
bucket_name = "vega-agent-files"

# ─── CF Browser Rendering ─────────────────────────────────────────────────────
# Enables @cloudflare/puppeteer in the Worker.
# npm install --save-dev @cloudflare/puppeteer
# Tools: cf_browse_page, cf_screenshot, cf_extract_data, cf_fill_form, cf_click
[browser]
binding = "MYBROWSER"

# ─── CF Email Inbound (native ACK replies) ────────────────────────────────────
# Used ONLY for sending ACK confirmation replies to inbound emails.
# Substantive outbound email still goes via Resend (send_email tool).
#
# Setup:
#   1. Enable Email Routing in Cloudflare dashboard (Email > Email Routing)
#   2. Verify at least one destination email address
#   3. Add a routing rule: vega@yourdomain.com → this Worker
#   4. Deploy — the email() handler in index.ts fires for every inbound message
#
# Note: destination_address is intentionally omitted so we can reply to any sender.
[[send_email]]
name = "CF_EMAIL_SENDER"

# ─── Secrets — set with: npx wrangler secret put SECRET_NAME ─────────────────

# Core (required)
# GEMINI_API_KEY            → https://aistudio.google.com/apikey  [PROTECTED — never in vault]

# Queue & Orchestration
# QSTASH_TOKEN              → https://console.upstash.com/qstash
# QSTASH_CURRENT_SIGNING_KEY
# QSTASH_NEXT_SIGNING_KEY

# Redis
# UPSTASH_REDIS_REST_URL    → https://console.upstash.com/redis
# UPSTASH_REDIS_REST_TOKEN

# Vector Memory
# UPSTASH_VECTOR_REST_URL   → https://console.upstash.com/vector
# UPSTASH_VECTOR_REST_TOKEN

# ── NEW: Keys Vault ────────────────────────────────────────────────────────────
# VAULT_ENCRYPTION_SECRET   → random 32+ char string:  openssl rand -base64 32
#                             NEVER change this after first user stores a key —
#                             all existing encrypted values would become unreadable.
#                             npx wrangler secret put VAULT_ENCRYPTION_SECRET

# Internal auth
# TELEGRAM_INTERNAL_SECRET  → shared secret Next.js ↔ Worker

# Integrations (optional — tools degrade gracefully)
# SERPER_API_KEY            → https://serper.dev
# RESEND_API_KEY            → https://resend.com
# RESEND_FROM_EMAIL         → verified sender for outbound email
# GITHUB_TOKEN
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_FROM_NUMBER
# WHATSAPP_APP_SECRET
# WHATSAPP_WEBHOOK_VERIFY_TOKEN
# E2B_API_KEY               → https://e2b.dev (code execution sandbox)
# BROWSERLESS_TOKEN         → https://browserless.io (legacy browse_web fallback)

# ─── Native CF Cron (self-healing + triggers + reflection) ───────────────────
# Runs every 5 minutes automatically. Free, no QStash credits consumed.
# Calls the same logic as POST /cron/tick but skips QStash signature check.
[triggers]
crons = ["*/5 * * * *"]